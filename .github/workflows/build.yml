name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk unzip
        sudo ln -sf /usr/lib/jvm/java-17-openjdk-amd64 /usr/lib/jvm/default-java
    
    - name: Install buildozer and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer==1.5.0 kivy==2.3.0 requests pillow cython
    
    - name: Build debug APK
      run: |
        cd workspace-android
        buildozer android debug
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: onu-query-apk
        path: workspace-android/bin/*.apk
