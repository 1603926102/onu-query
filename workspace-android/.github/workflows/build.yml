name: 🤖 Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install build dependencies
        run: |
          pip install buildozer==1.5.0 kivy==2.3.0 requests pillow

      - name: Build debug APK
        env:
          BUILDOZER_ANDROID_MINSDK: 21
          BUILDOZER_ANDROID_API: 27
          BUILDOZER_ANDROID_ARCHS: "arm64-v8a armeabi-v7a"
        run: |
          buildozer -v android debug 2>&1 | tail -30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: onu-query-apk
          path: bin/*.apk
          retention-days: 7
